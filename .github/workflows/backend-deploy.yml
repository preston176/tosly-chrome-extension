name: Backend Deploy

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-deploy.yml'
  workflow_dispatch:

# Never let two deploys run at once; let an in-flight deploy finish.
concurrency:
  group: backend-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.DROPLET_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.DROPLET_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Sync backend to droplet
        run: |
          rsync -az --delete \
            --exclude '.env' \
            --exclude '.DS_Store' \
            -e "ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes" \
            backend/ \
            "${{ secrets.DROPLET_USER }}@${{ secrets.DROPLET_HOST }}:/opt/tosly-backend/"

      - name: Rebuild and restart
        run: |
          ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes \
            "${{ secrets.DROPLET_USER }}@${{ secrets.DROPLET_HOST }}" \
            'cd /opt/tosly-backend && docker compose -f docker-compose.prod.yml up -d --build && docker image prune -f'

      - name: Health check
        run: |
          for i in $(seq 1 10); do
            if curl -fsS https://api.tosly.online/health; then
              echo " — backend healthy"
              exit 0
            fi
            echo "waiting for backend to come up... ($i/10)"
            sleep 3
          done
          echo "health check failed after restart"
          exit 1
