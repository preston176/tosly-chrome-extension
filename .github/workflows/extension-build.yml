name: Extension Build

on:
  push:
    branches: [main]
    paths:
      - 'extension/**'
      - '.github/workflows/extension-build.yml'
  pull_request:
    paths:
      - 'extension/**'
      - '.github/workflows/extension-build.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: extension

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: extension/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build extension (production)
        env:
          PLASMO_PUBLIC_BACKEND_URL: https://tosly-backend.onrender.com
        run: npm run build

      - name: Package extension
        run: npm run package

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: tosly-extension-build
          path: extension/build/chrome-mv3-prod
          retention-days: 14

      - name: Upload zipped artifact
        uses: actions/upload-artifact@v4
        with:
          name: tosly-extension-zip
          path: extension/build/chrome-mv3-prod.zip
          retention-days: 30
