name: Extension Release

on:
  push:
    tags:
      - 'extension-v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: extension

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: extension/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build extension (production)
        env:
          PLASMO_PUBLIC_BACKEND_URL: ${{ vars.PLASMO_PUBLIC_BACKEND_URL || 'https://tosly-backend.onrender.com' }}
        run: npm run build

      - name: Package extension
        run: npm run package

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#extension-v}" >> $GITHUB_OUTPUT

      - name: Rename zip with version
        run: mv build/chrome-mv3-prod.zip build/tosly-${{ steps.version.outputs.version }}.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Tosly Extension ${{ steps.version.outputs.version }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: extension/build/tosly-${{ steps.version.outputs.version }}.zip

      # Optional: auto-publish to Chrome Web Store
      # Requires CWS_* secrets configured. Skipped if not set.
      - name: Publish to Chrome Web Store
        if: ${{ env.CWS_EXTENSION_ID != '' }}
        env:
          CWS_EXTENSION_ID: ${{ secrets.CWS_EXTENSION_ID }}
          CWS_CLIENT_ID: ${{ secrets.CWS_CLIENT_ID }}
          CWS_CLIENT_SECRET: ${{ secrets.CWS_CLIENT_SECRET }}
          CWS_REFRESH_TOKEN: ${{ secrets.CWS_REFRESH_TOKEN }}
        run: |
          npx -y chrome-webstore-upload-cli@3 upload \
            --source build/tosly-${{ steps.version.outputs.version }}.zip \
            --extension-id "$CWS_EXTENSION_ID" \
            --client-id "$CWS_CLIENT_ID" \
            --client-secret "$CWS_CLIENT_SECRET" \
            --refresh-token "$CWS_REFRESH_TOKEN" \
            --auto-publish
